services:
  - type: web
    name: bfhl-api
    env: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/bfhl-1.0.0.jar
    envVars:
      - key: APP_USER_NAME
        value: your_name_here           # e.g. john_doe
      - key: APP_USER_DOB
        value: ddmmyyyy                 # e.g. 17091999
      - key: APP_USER_EMAIL
        value: your@email.com
      - key: APP_USER_ROLL
        value: YOURROLLNO
